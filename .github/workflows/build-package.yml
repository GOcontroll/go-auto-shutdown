name: Build and publish go-auto-shutdown package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture arm64

          sudo rm -f /etc/apt/sources.list.d/ubuntu.sources
          sudo tee /etc/apt/sources.list.d/ubuntu.sources > /dev/null << 'SOURCES'
          Types: deb
          URIs: http://archive.ubuntu.com/ubuntu
          Suites: noble noble-updates noble-backports
          Components: main universe restricted multiverse
          Architectures: amd64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

          Types: deb
          URIs: http://security.ubuntu.com/ubuntu
          Suites: noble-security
          Components: main universe restricted multiverse
          Architectures: amd64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-security
          Components: main universe
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          SOURCES

          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu dpkg-dev libiio-dev:arm64

      - name: Build
        run: |
          aarch64-linux-gnu-gcc -o go-auto-shutdown main.c \
            -I/usr/include \
            -L/usr/lib/aarch64-linux-gnu \
            -liio

      - name: Build .deb
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE=go-auto-shutdown
          ARCH=arm64
          BUILD="${RUNNER_TEMP}/${PACKAGE}_${VERSION}_${ARCH}"
          DIST="${RUNNER_TEMP}/dist"

          mkdir -p "${BUILD}/DEBIAN" \
                   "${BUILD}/usr/bin" \
                   "${BUILD}/usr/lib/systemd/system" \
                   "${DIST}"

          install -Dm755 go-auto-shutdown \
            "${BUILD}/usr/bin/go-auto-shutdown"

          install -Dm644 debian/go-auto-shutdown.service \
            "${BUILD}/usr/lib/systemd/system/go-auto-shutdown.service"

          cat > "${BUILD}/DEBIAN/control" << CONTROL
          Package: ${PACKAGE}
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: GOcontroll B.V. <info@gocontroll.com>
          Depends: libc6 (>= 2.34), libiio0 (>= 0.26)
          Section: misc
          Priority: optional
          Homepage: https://gocontroll.com
          Description: Automatic controller shutdown based on KL15 signal
           Monitors the KL15 ignition signal and shuts down the controller when
           no KL15 is detected and no application is actively managing shutdown.
           Prevents the controller from remaining powered unnecessarily when the
           vehicle ignition is switched off.
          CONTROL

          cat > "${BUILD}/DEBIAN/postinst" << 'POSTINST'
          #!/bin/bash
          set -e
          case "$1" in
              configure)
                  systemctl daemon-reload
                  systemctl enable go-auto-shutdown.service
                  ;;
          esac
          POSTINST
          chmod 755 "${BUILD}/DEBIAN/postinst"

          cat > "${BUILD}/DEBIAN/prerm" << 'PRERM'
          #!/bin/bash
          set -e
          case "$1" in
              remove|purge)
                  systemctl stop go-auto-shutdown.service || true
                  systemctl disable go-auto-shutdown.service || true
                  ;;
          esac
          PRERM
          chmod 755 "${BUILD}/DEBIAN/prerm"

          cat > "${BUILD}/DEBIAN/postrm" << 'POSTRM'
          #!/bin/bash
          set -e
          case "$1" in
              purge)
                  systemctl daemon-reload || true
                  ;;
          esac
          POSTRM
          chmod 755 "${BUILD}/DEBIAN/postrm"

          dpkg-deb -Zxz --build --root-owner-group "${BUILD}" \
            "${DIST}/${PACKAGE}_${VERSION}_${ARCH}.deb"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/dist/go-auto-shutdown_${{ steps.version.outputs.version }}_arm64.deb
          generate_release_notes: true

      - name: Trigger go-apt index rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: GOcontroll/go-apt
          event-type: rebuild-index
          client-payload: |
            {
              "package": "go-auto-shutdown",
              "version": "${{ steps.version.outputs.version }}",
              "arch": "arm64",
              "deb_url": "https://github.com/GOcontroll/go-auto-shutdown/releases/download/${{ github.ref_name }}/go-auto-shutdown_${{ steps.version.outputs.version }}_arm64.deb"
            }
